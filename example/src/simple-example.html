<!doctype html>
<html>
  <head>
    <title>Featureflow TypeScript Example</title>
    <link href="/public/style.css" rel="stylesheet"/>
    <link href="/public/lumen.bootstrap.min.css" rel="stylesheet"/>
    <link rel="shortcut icon" href="/public/favicon.ico" />
    <style>
      body {
        padding: 20px;
      }
      .example-section {
        margin: 20px 0;
        padding: 15px;
        border: 1px solid #ddd;
        border-radius: 4px;
      }
      .example-section h3 {
        margin-top: 0;
        color: #337ab7;
      }
      .result {
        background-color: #f5f5f5;
        padding: 10px;
        border-radius: 4px;
        margin-top: 10px;
        font-family: monospace;
      }
      .feature-value {
        display: inline-block;
        padding: 5px 10px;
        margin: 5px;
        border-radius: 3px;
        background-color: #5cb85c;
        color: white;
      }
      .feature-value.off {
        background-color: #d9534f;
      }
      .attributes-list {
        list-style-type: none;
        padding-left: 0;
        margin: 10px 0;
      }
      .attributes-list li {
        padding: 5px 0;
        border-bottom: 1px solid #eee;
      }
      .attribute-value {
        color: #2196F3;
        font-weight: 500;
      }
      .no-attributes {
        color: #999;
        font-style: italic;
      }
    </style>
  </head>
<body>
  <div class="container">
    <h1>Featureflow TypeScript Example</h1>
    <p>Open the browser console to see detailed logs.</p>
    
    <div id="app">
      <div class="example-section">
        <h3>Example 1: Basic Feature Evaluation</h3>
        <div id="example1" class="result">Loading...</div>
      </div>
      
      <div class="example-section">
        <h3>Example 2: Conditional Logic</h3>
        <div id="example2" class="result">Loading...</div>
      </div>
      
      <div class="example-section">
        <h3>Example 3: All Features</h3>
        <div id="example3" class="result">Loading...</div>
      </div>
      
      <div class="example-section">
        <h3>Current User Context</h3>
        <div id="user-display" class="result">Loading...</div>
      </div>
      
      <div class="example-section">
        <h3>Example 4: Event Logs</h3>
        <div id="example4" class="result">
          <ul id="events-list"></ul>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
