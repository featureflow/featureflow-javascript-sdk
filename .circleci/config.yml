version: 2 # See https://circleci.com/blog/publishing-npm-packages-using-circleci-2-0/

defaults: &defaults
  working_directory: ~/repo
  docker:
    - image: cimg/node:24.0-browsers

jobs:
  test:
    <<: *defaults
    steps:
      - checkout

      - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "package.json" }}
            # fallback to using the latest cache if no exact match is found
            - v1-dependencies-

      - run: npm install
      - run:
          name: Setup Chrome for testing
          command: |
            # The cimg/node:24.0-browsers image should have Chrome, but let's find it
            CHROME_PATH=$(which google-chrome || which chromium || which chromium-browser || echo "")
            if [ -z "$CHROME_PATH" ]; then
              echo "Chrome not in PATH, checking common locations..."
              if [ -f /usr/bin/google-chrome ]; then
                CHROME_PATH=/usr/bin/google-chrome
              elif [ -f /usr/bin/chromium ]; then
                CHROME_PATH=/usr/bin/chromium
              elif [ -f /usr/bin/chromium-browser ]; then
                CHROME_PATH=/usr/bin/chromium-browser
              else
                echo "Installing Chromium..."
                sudo apt-get update
                sudo apt-get install -y chromium-browser
                CHROME_PATH=$(which chromium-browser || echo "/usr/bin/chromium-browser")
              fi
            fi
            echo "export CHROME_BIN=$CHROME_PATH" >> $BASH_ENV
            echo "Chrome binary found at: $CHROME_PATH"
      - run:
          name: Run tests
          command: npm test

      - save_cache:
          paths:
            - node_modules
          key: v1-dependencies-{{ checksum "package.json" }}

      - persist_to_workspace:
          root: ~/repo
          paths: .
  deploy:
    <<: *defaults
    steps:
      - attach_workspace:
          at: ~/repo
      - run:
          name: Authenticate with registry
          command: echo "//registry.npmjs.org/:_authToken=$npm_TOKEN" > ~/repo/.npmrc
      - run:
          name: Publish package
          command: npm publish
      - run: chmod +x ./deploy_prod_s3.sh
      - run: ./deploy_prod_s3.sh

workflows:
  version: 2
  test-deploy:
    jobs:
      - test:
          filters:
            tags:
              only: /^v.*/
      - deploy:
          requires:
            - test
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/