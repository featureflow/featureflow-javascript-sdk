version: 2 # See https://circleci.com/blog/publishing-npm-packages-using-circleci-2-0/

defaults: &defaults
  working_directory: ~/repo
  docker:
    - image: cimg/node:24.0-browsers

jobs:
  test:
    <<: *defaults
    steps:
      - checkout

      - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "package.json" }}
            # fallback to using the latest cache if no exact match is found
            - v1-dependencies-

      - run: npm install
      - run:
          name: Setup Chrome for testing
          command: |
            # Check if Chrome/Chromium is already available
            CHROME_PATH=$(which google-chrome || which chromium || echo "")
            
            if [ -z "$CHROME_PATH" ]; then
              echo "Installing Google Chrome..."
              # Install Google Chrome stable via official repository
              curl -fsSL https://dl.google.com/linux/linux_signing_key.pub | sudo gpg --dearmor -o /usr/share/keyrings/google-chrome.gpg
              echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome.gpg] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
              sudo apt-get update
              sudo apt-get install -y google-chrome-stable
              CHROME_PATH=$(which google-chrome || echo "/usr/bin/google-chrome")
            fi
            
            echo "export CHROME_BIN=$CHROME_PATH" >> $BASH_ENV
            echo "Chrome binary found at: $CHROME_PATH"
            $CHROME_PATH --version || echo "Chrome version check failed"
      - run:
          name: Run tests
          command: npm test

      - save_cache:
          paths:
            - node_modules
          key: v1-dependencies-{{ checksum "package.json" }}

      - persist_to_workspace:
          root: ~/repo
          paths: .
  deploy:
    <<: *defaults
    steps:
      - attach_workspace:
          at: ~/repo
      - run:
          name: Authenticate with registry
          command: echo "//registry.npmjs.org/:_authToken=$npm_TOKEN" > ~/repo/.npmrc
      - run:
          name: Publish package
          command: npm publish
      - run: chmod +x ./deploy_prod_s3.sh
      - run: ./deploy_prod_s3.sh

workflows:
  version: 2
  test-deploy:
    jobs:
      - test:
          filters:
            tags:
              only: /^v.*/
      - deploy:
          requires:
            - test
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/